<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{SUBJECT}</title>
</head>
<body style="font-family:Arial,sans-serif; line-height:1.6; color:#1f2937; margin:0; padding:24px;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td>
        <p style="margin:0 0 12px 0;">Subject: <strong>{SUBJECT}</strong></p>
        <p style="margin:0 0 12px 0;">Dear {RECIPIENT_NAME},</p>
        <p style="margin:0 0 12px 0;">Thank you for your email of {REFERENCE_DATE}.</p>
        <p style="margin:0 0 12px 0;">I am writing with reference to {REFERENCE}.</p>
        <p style="margin:0 0 12px 0;">{CONTEXT}</p>
        <p style="margin:0 0 12px 0;">{NEXT_STEP}</p>
        <p style="margin:0 0 12px 0;">Kind regards,<br>{SENDER_NAME}<br>{SENDER_ROLE}</p>
      </td>
    </tr>
  </table>

  <!-- Phrase bank (from business_email.pdf):
  - Thank you for your email of 14 June.
  - I am writing with reference to your enquiry of 6 November.
  - In response to the questions in your email, I am writing with further information.
  -->
</body>
</html>
