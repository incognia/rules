<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{SUBJECT}</title>
</head>
<body style="font-family:Arial,sans-serif; line-height:1.6; color:#1f2937; margin:0; padding:24px;">
  <p style="margin:0 0 12px 0;">Subject: <strong>{SUBJECT}</strong></p>
  <p style="margin:0 0 12px 0;">Dear {RECIPIENT_NAME},</p>
  <p style="margin:0 0 12px 0;">Thank you for your email regarding {REFERENCE}.</p>
  <p style="margin:0 0 12px 0;">We are pleased to inform you that {GOOD_NEWS}.</p>
  <p style="margin:0 0 12px 0;">{CONFIRMATION_DETAILS}</p>
  <p style="margin:0 0 12px 0;">If you need any further information, please feel free to email me.</p>
  <p style="margin:0 0 12px 0;">Kind regards,<br>{SENDER_NAME}<br>{SENDER_ROLE}</p>

  <!-- Phrase bank (from business_email.pdf):
  - We are pleased/happy/glad to inform you that....
  - We are pleased to let you know that...
  - Thank you for your email regarding ...
  -->
</body>
</html>
